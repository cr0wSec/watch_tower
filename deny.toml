[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

# ADVISORIES - Known vulnerabilities
[advisories]
ignore = [
    # atty is a transitive dependency of dotenvy -> clap v3
    # No fix available, waiting for dotenvy to update
    { id = "RUSTSEC-2024-0375", reason = "transitive dep via dotenvy->clap v3, no fix available" },
]

# LICENSES - License verification
[licenses]
# Allowed permissive licenses
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unlicense",
    "Zlib",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "BSL-1.0",
    "MIT-0",
]
confidence-threshold = 0.8
exceptions = []

[licenses.private]
# Ignore workspace crates that are not published
ignore = true
registries = []

# BANS - Forbidden or duplicate crates
[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []
skip = []
skip-tree = []

# SOURCES - Dependency origins
[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
bitbucket = []